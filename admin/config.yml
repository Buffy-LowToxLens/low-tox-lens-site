backend:
name: git-gateway
branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:

* name: "pages"
  label: "Pages"
  files:

  * label: "Homepage"
    name: "home"
    file: "index.html"
    fields:

    * { label: "Heading", name: "heading", widget: "string" }
    * { label: "Subheading", name: "subheading", widget: "string" }
